  <line x1="100" y1="350" x2="700" y2="350" stroke="#2a2f3e" stroke-dasharray="2 4"></line>
  <line x1="100" y1="400" x2="700" y2="400" stroke="#2a2f3e" stroke-dasharray="2 4"></line>
  <line x1="100" y1="450" x2="700" y2="450" stroke="#2a2f3e" stroke-dasharray="2 4"></line>

  
  <path d="M 100 440 L 160 425 L 220 410 L 280 400 L 340 380 L 400 360 L 460 340 L 520 320 L 580 320 L 640 305 L 700 280 L 700 470 L 100 470 Z" fill="url(#areaG)"></path>
  <path d="M 100 440 L 160 425 L 220 410 L 280 400 L 340 380 L 400 360 L 460 340 L 520 320 L 580 320 L 640 305 L 700 280" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
  <circle cx="700" cy="280" r="5" fill="#d4b85f" stroke="#0a0f1e" stroke-width="2"></circle>

  
  <path d="M 100 460 L 160 450 L 220 442 L 280 430 L 340 422 L 400 410 L 460 400 L 520 388 L 580 380 L 640 365 L 700 350" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4 4" stroke-linecap="round"></path>

  
  <circle cx="500" cy="310" r="4" fill="#c9a84c"></circle>
  <text x="510" y="314" fill="#b0b0b0" font-size="10" font-family="Inter,sans-serif">Clicks</text>
  <line x1="560" y1="310" x2="572" y2="310" stroke="#888" stroke-width="2" stroke-dasharray="2 2"></line>
  <text x="578" y="314" fill="#b0b0b0" font-size="10" font-family="Inter,sans-serif">Impressions</text>

  <text x="400" y="80" fill="#c9a84c" font-size="13" font-family="Inter,sans-serif" font-weight="700" letter-spacing="6" text-anchor="middle">SEO ANALYTICS</text>
  <text x="400" y="104" fill="#fff" font-size="16" font-family="Cairo,sans-serif" font-weight="700" text-anchor="middle">Revenue-First Reporting · No Vanity Metrics</text>
  <text x="400" y="555" fill="#666c7a" font-size="11" font-family="Inter,sans-serif" font-weight="700" letter-spacing="3" text-anchor="middle">EVERY METRIC TIED TO BUSINESS OUTCOMES</text>
