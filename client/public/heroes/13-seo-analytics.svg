<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="SEO Analytics — performance dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0f1e"></stop><stop offset="100%" stop-color="#0d1426"></stop></linearGradient>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M50 0H0V50" fill="none" stroke="#c9a84c" stroke-opacity="0.045"></path></pattern>
    <radialGradient id="glow"><stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"></stop><stop offset="100%" stop-color="#c9a84c" stop-opacity="0"></stop></radialGradient>
    <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c9a84c" stop-opacity="0.5"></stop><stop offset="100%" stop-color="#c9a84c" stop-opacity="0"></stop></linearGradient>
    <linearGradient id="goldF" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"></stop><stop offset="100%" stop-color="#d4b85f"></stop></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"></rect>
  <rect width="800" height="600" fill="url(#grid)"></rect>
  <ellipse cx="400" cy="320" rx="340" ry="260" fill="url(#glow)"></ellipse>

  
  <rect x="60" y="130" width="680" height="380" rx="14" fill="#1a1f2e" stroke="#2a2f3e" stroke-width="1.5"></rect>
  <rect x="60" y="130" width="680" height="42" rx="14" fill="#0a0f1e"></rect>
  <rect x="60" y="156" width="680" height="16" fill="#0a0f1e"></rect>
  <circle cx="78" cy="153" r="5" fill="#c9a84c"></circle>
