      <text x="0" y="6" fill="#0a0f1e" font-size="22" font-family="Cairo,sans-serif" font-weight="800" text-anchor="middle">♛</text>
    </g>

    
    <g stroke="#c9a84c" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
