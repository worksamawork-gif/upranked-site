    <text x="598" y="210" fill="#0a0f1e" font-size="10" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">AVG POSITION</text>
    <text x="598" y="240" fill="#0a0f1e" font-size="24" font-family="Cairo,sans-serif" font-weight="800">3.2</text>
    <text x="598" y="258" fill="#0a0f1e" font-size="11" font-family="Inter,sans-serif" font-weight="700">↑ from 8.4</text>
  </g>

  
  <rect x="80" y="288" width="644" height="200" rx="10" fill="rgba(255,255,255,0.02)" stroke="#2a2f3e"></rect>
