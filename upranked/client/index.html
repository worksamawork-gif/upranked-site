    <!-- Twemoji: defer so it doesn't block HTML parsing (non-critical) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Parse emojis after React mounts — guard for defer-loaded twemoji
      function parseEmoji() {
        if (typeof twemoji !== 'undefined') {
          twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
        }
      }
      window.addEventListener('load', parseEmoji);
      document.addEventListener('DOMContentLoaded', function() {
        var root = document.getElementById('root');
        if (!root) return;
        var observer = new MutationObserver(parseEmoji);
        observer.observe(root, { childList: true, subtree: true });
      });
    </script>
  </body>
