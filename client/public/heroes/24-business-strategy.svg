    <text x="115" y="174" fill="#c9a84c" font-size="8" letter-spacing="1">MOVE 1</text>
    <text x="115" y="187" fill="#fff" font-size="11" font-family="Cairo,sans-serif">Market Audit</text>

    <rect x="570" y="160" width="130" height="32" rx="6" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></rect>
