    <circle cx="700" cy="120" r="2.5" fill="#d4b85f"></circle>
  </g>

  
  <line x1="700" y1="120" x2="700" y2="60" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="3 3"></line>
  <rect x="610" y="20" width="180" height="42" rx="8" fill="#1a1f2e" stroke="#c9a84c" stroke-width="1.5"></rect>
  <text x="625" y="38" fill="#c9a84c" font-size="11" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1.5">+412% ORGANIC</text>
  <text x="625" y="54" fill="#fff" font-size="13" font-family="Cairo,sans-serif" font-weight="700">12-month engagement</text>

  
  <text x="100" y="510" fill="#666c7a" font-size="11" font-family="Inter,sans-serif" text-anchor="middle">M1</text>
