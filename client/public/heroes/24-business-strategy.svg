    </g>
    <g>
      <circle cx="216" cy="24" r="14" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1.5"></circle>
      <circle cx="216" cy="24" r="6" fill="#c9a84c"></circle>
    </g>
    <g>
      <circle cx="24" cy="216" r="14" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1.5"></circle>
      <circle cx="24" cy="216" r="6" fill="#c9a84c"></circle>
