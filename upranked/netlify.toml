[build]
  command   = "echo 'serving pre-built dist'"
  publish   = "dist/public"

[build.environment]
  NODE_VERSION = "20"

# Canonical redirects — prevent authority split on non-trailing-slash URLs
[[redirects]]
  from   = "/markets/gcc/uae/dubai"
  to     = "/markets/gcc/uae/dubai/"
  status = 301
  force  = true

[[redirects]]
  from   = "/blog/bilingual-seo-arabic-english"
  to     = "/blog/bilingual-seo-arabic-english/"
  status = 301
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
