<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="upranked.io organic traffic growth chart">
  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"></stop>
      <stop offset="100%" stop-color="#0d1426"></stop>
    </linearGradient>
    <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid1" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#c9a84c" stroke-opacity="0.05"></path>
    </pattern>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgFade)"></rect>
  <rect width="800" height="600" fill="url(#grid1)"></rect>
  <ellipse cx="600" cy="300" rx="350" ry="280" fill="url(#glow1)"></ellipse>

  
  <line x1="80" y1="120" x2="740" y2="120" stroke="#2a2f3e" stroke-width="1" stroke-dasharray="2 4"></line>
