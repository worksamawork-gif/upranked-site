  <text x="400" y="104" fill="#fff" font-size="16" font-family="Cairo,sans-serif" font-weight="700" text-anchor="middle">Multi-Move Growth Playbooks</text>
  <text x="400" y="465" fill="#666c7a" font-size="11" font-family="Inter,sans-serif" font-weight="700" letter-spacing="3" text-anchor="middle">THINK 5 MOVES AHEAD · BUILD COMPOUNDING ADVANTAGE</text>
