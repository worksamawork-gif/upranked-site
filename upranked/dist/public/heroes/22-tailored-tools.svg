<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Tailored Tools — custom growth dashboards">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0f1e"></stop><stop offset="100%" stop-color="#0d1426"></stop></linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="16" cy="16" r="1" fill="#c9a84c" fill-opacity="0.08"></circle></pattern>
    <radialGradient id="glow"><stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"></stop><stop offset="100%" stop-color="#c9a84c" stop-opacity="0"></stop></radialGradient>
    <linearGradient id="goldF" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"></stop><stop offset="100%" stop-color="#d4b85f"></stop></linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"></rect>
  <rect width="800" height="600" fill="url(#dots)"></rect>
  <ellipse cx="400" cy="320" rx="340" ry="260" fill="url(#glow)"></ellipse>

  
  <rect x="180" y="160" width="440" height="280" rx="14" fill="#1a1f2e" stroke="#c9a84c" stroke-width="1.5"></rect>
  <rect x="180" y="160" width="440" height="32" rx="14" fill="#0a0f1e"></rect>
  <rect x="180" y="180" width="440" height="12" fill="#0a0f1e"></rect>
  <circle cx="200" cy="178" r="4" fill="#c9a84c"></circle>
  <circle cx="214" cy="178" r="4" fill="#666c7a"></circle>
  <circle cx="228" cy="178" r="4" fill="#666c7a"></circle>
  <text x="400" y="182" fill="#666c7a" font-size="10" font-family="Inter,sans-serif" text-anchor="middle">your-brand · growth dashboard</text>

  
  <g>
    <rect x="200" y="210" width="120" height="60" rx="8" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.3)"></rect>
    <text x="210" y="226" fill="#c9a84c" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">CLICKS</text>
    <text x="210" y="248" fill="#fff" font-size="18" font-family="Cairo,sans-serif" font-weight="800">12.4k</text>
    <text x="210" y="262" fill="#c9a84c" font-size="10" font-family="Inter,sans-serif">↑ +38%</text>
  </g>
  <g>
    <rect x="340" y="210" width="120" height="60" rx="8" fill="url(#goldF)"></rect>
    <text x="350" y="226" fill="#0a0f1e" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">REVENUE</text>
    <text x="350" y="248" fill="#0a0f1e" font-size="18" font-family="Cairo,sans-serif" font-weight="800">$284k</text>
    <text x="350" y="262" fill="#0a0f1e" font-size="10" font-family="Inter,sans-serif" font-weight="600">↑ +47%</text>
  </g>
  <g>
    <rect x="480" y="210" width="120" height="60" rx="8" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.3)"></rect>
    <text x="490" y="226" fill="#c9a84c" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">POSITION</text>
    <text x="490" y="248" fill="#fff" font-size="18" font-family="Cairo,sans-serif" font-weight="800">#1.8</text>
    <text x="490" y="262" fill="#c9a84c" font-size="10" font-family="Inter,sans-serif">avg of 240</text>
  </g>

  
  <rect x="200" y="290" width="400" height="130" rx="8" fill="rgba(255,255,255,0.02)" stroke="#2a2f3e"></rect>
  <line x1="220" y1="330" x2="580" y2="330" stroke="#2a2f3e" stroke-dasharray="2 4"></line>
  <line x1="220" y1="370" x2="580" y2="370" stroke="#2a2f3e" stroke-dasharray="2 4"></line>
  <path d="M 220 400 L 280 380 L 340 360 L 400 340 L 460 310 L 520 290 L 580 280" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"></path>
  <circle cx="580" cy="280" r="5" fill="#d4b85f" stroke="#0a0f1e" stroke-width="2"></circle>
  <text x="210" y="308" fill="#666c7a" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">CUSTOM KPI · 30 DAYS</text>

  
  <rect x="370" y="440" width="60" height="40" fill="#1a1f2e" stroke="#2a2f3e"></rect>
  <rect x="320" y="478" width="160" height="8" rx="4" fill="#2a2f3e"></rect>

  
  <g transform="translate(90,250)">
    <rect width="60" height="60" rx="10" fill="rgba(201,168,76,0.08)" stroke="#c9a84c" stroke-opacity="0.4"></rect>
    <g transform="translate(30,30)" stroke="#c9a84c" stroke-width="1.5" fill="none">
      <circle r="12"></circle><circle r="4" fill="#c9a84c"></circle>
      <line x1="0" y1="-14" x2="0" y2="-18"></line><line x1="0" y1="14" x2="0" y2="18"></line>
      <line x1="-14" y1="0" x2="-18" y2="0"></line><line x1="14" y1="0" x2="18" y2="0"></line>
    </g>
  </g>
  <g transform="translate(90,330)">
    <rect width="60" height="60" rx="10" fill="rgba(201,168,76,0.08)" stroke="#c9a84c" stroke-opacity="0.4"></rect>
    <g transform="translate(30,30)" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round">
      <line x1="-16" y1="-8" x2="16" y2="-8"></line><circle cx="-4" cy="-8" r="4" fill="#c9a84c" stroke="none"></circle>
      <line x1="-16" y1="0" x2="16" y2="0"></line><circle cx="8" cy="0" r="4" fill="#c9a84c" stroke="none"></circle>
      <line x1="-16" y1="8" x2="16" y2="8"></line><circle cx="-10" cy="8" r="4" fill="#c9a84c" stroke="none"></circle>
    </g>
  </g>

  <g transform="translate(650,250)">
    <rect width="60" height="60" rx="10" fill="rgba(201,168,76,0.08)" stroke="#c9a84c" stroke-opacity="0.4"></rect>
    <g transform="translate(30,30)" stroke="#c9a84c" stroke-width="1.5" fill="none">
      <rect x="-12" y="-12" width="24" height="24" rx="2"></rect><line x1="-12" y1="-4" x2="12" y2="-4"></line><circle cx="-6" cy="-8" r="1" fill="#c9a84c"></circle><line x1="-8" y1="2" x2="8" y2="2"></line><line x1="-8" y1="8" x2="6" y2="8"></line>
    </g>
  </g>
  <g transform="translate(650,330)">
    <rect width="60" height="60" rx="10" fill="rgba(201,168,76,0.08)" stroke="#c9a84c" stroke-opacity="0.4"></rect>
    <g transform="translate(30,30)" stroke="#c9a84c" stroke-width="1.5" fill="none" stroke-linecap="round">
      <polyline points="-14,8 -6,0 2,4 14,-8"></polyline><circle cx="-14" cy="8" r="2" fill="#c9a84c"></circle><circle cx="14" cy="-8" r="2" fill="#c9a84c"></circle>
    </g>
  </g>

  <text x="400" y="80" fill="#c9a84c" font-size="13" font-family="Inter,sans-serif" font-weight="700" letter-spacing="6" text-anchor="middle">TAILORED TOOLS</text>
  <text x="400" y="104" fill="#fff" font-size="16" font-family="Cairo,sans-serif" font-weight="700" text-anchor="middle">Custom Growth Dashboards</text>
  <text x="400" y="540" fill="#666c7a" font-size="11" font-family="Inter,sans-serif" font-weight="700" letter-spacing="3" text-anchor="middle">BUILT FOR YOUR DATA · YOUR DECISIONS</text>
</svg>