      <rect x="0" y="96" width="48" height="48"></rect><rect x="96" y="96" width="48" height="48"></rect><rect x="192" y="96" width="48" height="48"></rect>
      <rect x="48" y="144" width="48" height="48"></rect><rect x="144" y="144" width="48" height="48"></rect>
      <rect x="0" y="192" width="48" height="48"></rect><rect x="96" y="192" width="48" height="48"></rect><rect x="192" y="192" width="48" height="48"></rect>
    </g>

    
    
    <g transform="translate(120,120)">
