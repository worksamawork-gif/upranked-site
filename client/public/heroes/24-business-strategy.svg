    <text x="-10" y="125" fill="#666c7a" font-size="10" font-family="Inter,sans-serif" font-weight="700" text-anchor="end">Q2</text>
    <text x="120" y="-10" fill="#666c7a" font-size="10" font-family="Inter,sans-serif" font-weight="700" text-anchor="middle">2026</text>
  </g>

  
  <g font-family="Inter,sans-serif" font-size="10" font-weight="700">
