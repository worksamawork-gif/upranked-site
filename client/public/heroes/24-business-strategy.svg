    <text x="585" y="187" fill="#fff" font-size="11" font-family="Cairo,sans-serif">Position Anchor</text>

    <rect x="100" y="410" width="130" height="32" rx="6" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></rect>
    <text x="115" y="424" fill="#c9a84c" font-size="8" letter-spacing="1">MOVE 3</text>
    <text x="115" y="437" fill="#fff" font-size="11" font-family="Cairo,sans-serif">Compound Plays</text>

    <rect x="570" y="410" width="130" height="32" rx="6" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></rect>
