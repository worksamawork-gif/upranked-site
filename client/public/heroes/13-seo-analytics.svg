  <text x="720" y="158" fill="#666c7a" font-size="10" font-family="Inter,sans-serif" text-anchor="end">Last 30 days · UTC+4</text>

  
  <g>
    <rect x="80" y="190" width="156" height="78" rx="10" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.3)"></rect>
    <text x="94" y="210" fill="#666c7a" font-size="10" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">ORGANIC TRAFFIC</text>
    <text x="94" y="240" fill="#fff" font-size="24" font-family="Cairo,sans-serif" font-weight="800">142.8K</text>
    <text x="94" y="258" fill="#c9a84c" font-size="11" font-family="Inter,sans-serif" font-weight="700">↑ +38.2% MoM</text>
  </g>
  <g>
    <rect x="248" y="190" width="156" height="78" rx="10" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.3)"></rect>
    <text x="262" y="210" fill="#666c7a" font-size="10" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">CONVERSIONS</text>
    <text x="262" y="240" fill="#fff" font-size="24" font-family="Cairo,sans-serif" font-weight="800">2,418</text>
    <text x="262" y="258" fill="#c9a84c" font-size="11" font-family="Inter,sans-serif" font-weight="700">↑ +51.4% MoM</text>
  </g>
  <g>
    <rect x="416" y="190" width="156" height="78" rx="10" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.3)"></rect>
    <text x="430" y="210" fill="#666c7a" font-size="10" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">REVENUE</text>
    <text x="430" y="240" fill="#fff" font-size="24" font-family="Cairo,sans-serif" font-weight="800">$284K</text>
    <text x="430" y="258" fill="#c9a84c" font-size="11" font-family="Inter,sans-serif" font-weight="700">↑ +47.9% MoM</text>
  </g>
  <g>
