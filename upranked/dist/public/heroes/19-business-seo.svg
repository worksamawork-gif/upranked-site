    <text x="0" y="22" fill="#c9a84c" font-size="100" font-family="Cairo,sans-serif" font-weight="800" text-anchor="middle">$</text>
  </g>

  
  <g>
    <path d="M 120 460 L 200 440 L 280 410 L 360 380 L 440 340 L 520 290 L 600 240 L 680 180" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
    <path d="M 120 460 L 200 440 L 280 410 L 360 380 L 440 340 L 520 290 L 600 240 L 680 180 L 680 480 L 120 480 Z" fill="url(#areaG)"></path>
    <polygon points="675,170 695,175 685,195" fill="#c9a84c"></polygon>
  </g>

  
  <g font-family="Inter,sans-serif" font-size="10" font-weight="600">
    <rect x="100" y="170" width="120" height="42" rx="8" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></rect>
