  <line x1="80" y1="420" x2="740" y2="420" stroke="#2a2f3e" stroke-width="1" stroke-dasharray="2 4"></line>
  <text x="70" y="424" fill="#666c7a" font-size="11" font-family="Inter,sans-serif" text-anchor="end">200k</text>

  
  <path d="M 100 460 L 175 430 L 250 405 L 325 360 L 400 370 L 475 280 L 550 230 L 625 170 L 700 120 L 740 90 L 740 480 L 100 480 Z" fill="url(#areaG)"></path>

  
  <path d="M 100 460 L 175 430 L 250 405 L 325 360 L 400 370 L 475 280 L 550 230 L 625 170 L 700 120 L 740 90" fill="none" stroke="#c9a84c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#lineGlow)"></path>

  
  <g>
    <circle cx="100" cy="460" r="9" fill="#c9a84c" fill-opacity="0.2"></circle>
