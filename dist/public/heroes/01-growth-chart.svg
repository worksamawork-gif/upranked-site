  <text x="70" y="224" fill="#666c7a" font-size="11" font-family="Inter,sans-serif" text-anchor="end">800k</text>
  <line x1="80" y1="320" x2="740" y2="320" stroke="#2a2f3e" stroke-width="1" stroke-dasharray="2 4"></line>
