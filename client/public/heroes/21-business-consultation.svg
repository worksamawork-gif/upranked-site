    <line x1="350" y1="358" x2="430" y2="358" stroke="#c9a84c" stroke-opacity="0.5" stroke-width="1.5" transform="rotate(-3 400 375)"></line>
    <line x1="350" y1="368" x2="430" y2="368" stroke="#c9a84c" stroke-opacity="0.3" transform="rotate(-3 400 375)"></line>
    <line x1="350" y1="378" x2="420" y2="378" stroke="#c9a84c" stroke-opacity="0.3" transform="rotate(-3 400 375)"></line>
    <line x1="350" y1="388" x2="425" y2="388" stroke="#c9a84c" stroke-opacity="0.3" transform="rotate(-3 400 375)"></line>
  </g>

  
  <g fill="rgba(201,168,76,0.18)" stroke="#c9a84c" stroke-width="1.5">
    
    <g transform="translate(220,280)"><circle cx="0" cy="0" r="18"></circle><path d="M-22 50 Q -22 18 0 18 Q 22 18 22 50 Z"></path></g>
    <g transform="translate(310,260)"><circle cx="0" cy="0" r="18"></circle><path d="M-22 50 Q -22 18 0 18 Q 22 18 22 50 Z"></path></g>
    
    <g transform="translate(490,260)"><circle cx="0" cy="0" r="18"></circle><path d="M-22 50 Q -22 18 0 18 Q 22 18 22 50 Z"></path></g>
    <g transform="translate(580,280)"><circle cx="0" cy="0" r="18"></circle><path d="M-22 50 Q -22 18 0 18 Q 22 18 22 50 Z"></path></g>
  </g>

  
  <g transform="translate(400,225)">
    <circle cx="0" cy="0" r="22" fill="url(#goldF)" stroke="#d4b85f" stroke-width="2"></circle>
    <path d="M-26 56 Q -26 22 0 22 Q 26 22 26 56 Z" fill="url(#goldF)"></path>
    <rect x="-30" y="-50" width="60" height="22" rx="11" fill="#0a0f1e" stroke="#c9a84c"></rect>
    <text x="0" y="-35" fill="#c9a84c" font-size="10" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1" text-anchor="middle">STRATEGIST</text>
  </g>

  
  <g>
    <rect x="100" y="170" width="170" height="56" rx="10" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></rect>
    <path d="M 170 220 L 175 232 L 185 220 Z" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></path>
    <text x="115" y="190" fill="#c9a84c" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">DIAGNOSIS</text>
    <text x="115" y="208" fill="#fff" font-size="11" font-family="Inter,sans-serif">&#34;Your funnel has 3</text>
    <text x="115" y="222" fill="#fff" font-size="11" font-family="Inter,sans-serif">revenue leaks…&#34;</text>
  </g>
  <g>
    <rect x="540" y="170" width="170" height="56" rx="10" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></rect>
    <path d="M 590 220 L 595 232 L 605 220 Z" fill="#1a1f2e" stroke="rgba(201,168,76,0.3)"></path>
    <text x="555" y="190" fill="#c9a84c" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="1">PRESCRIPTION</text>
    <text x="555" y="208" fill="#fff" font-size="11" font-family="Inter,sans-serif">&#34;Sector focus first.</text>
    <text x="555" y="222" fill="#fff" font-size="11" font-family="Inter,sans-serif">Then technical depth.&#34;</text>
  </g>

  <text x="400" y="80" fill="#c9a84c" font-size="13" font-family="Inter,sans-serif" font-weight="700" letter-spacing="6" text-anchor="middle">BUSINESS CONSULTATION</text>
  <text x="400" y="104" fill="#fff" font-size="16" font-family="Cairo,sans-serif" font-weight="700" text-anchor="middle">Strategic Advisory · Growth Intelligence</text>
  <text x="400" y="500" fill="#666c7a" font-size="11" font-family="Inter,sans-serif" font-weight="700" letter-spacing="3" text-anchor="middle">DIAGNOSIS · PRESCRIPTION · IMPLEMENTATION</text>
