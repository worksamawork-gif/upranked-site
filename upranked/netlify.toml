[build]
  command   = "echo 'serving pre-built dist'"
  publish   = "dist/public"

[build.environment]
  NODE_VERSION = "20"

# Canonical redirects — prevent authority split on non-trailing-slash URLs
[[redirects]]
  from   = "/markets/gcc/uae/dubai"
  to     = "/markets/gcc/uae/dubai/"
  status = 301
  force  = true

[[redirects]]
  from   = "/blog/bilingual-seo-arabic-english"
  to     = "/blog/bilingual-seo-arabic-english/"
  status = 301
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://scripts.clarity.ms https://www.clarity.ms https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://xusvmvvosdvmixtqkiop.supabase.co https://www.clarity.ms https://api.clarity.ms; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"
