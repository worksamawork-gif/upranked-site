      <path d="M 120 120 L 216 24" stroke-dasharray="4 4"></path>
      <path d="M 120 120 L 24 216" stroke-dasharray="4 4"></path>
      <path d="M 120 120 L 216 216" stroke-dasharray="4 4"></path>
