[build]
  base      = "upranked"
  command   = "echo 'serving pre-built dist'"
  publish   = "dist/public"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.clarity.ms https://cdn.jsdelivr.net 'sha256-w5G5e17wNZsW8CUQ12OgkgT+YH218+peLcwCeZxda/A='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://xusvmvvosdvmixtqkiop.supabase.co; connect-src 'self' https://xusvmvvosdvmixtqkiop.supabase.co https://e.clarity.ms https://e0.clarity.ms; font-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"
